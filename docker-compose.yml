services:
  db:
    image: postgres:16-alpine
    container_name: zeitnest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-zeitnest}
      POSTGRES_USER: ${DB_USER:-zeitnest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zeitnest-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zeitnest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zeitnest:
    build: .
    container_name: zeitnest-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-zeitnest}
      - DB_USER=${DB_USER:-zeitnest}
      - DB_PASSWORD=${DB_PASSWORD:-zeitnest-secret}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - BASE_URL=${BASE_URL}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: zeitnest-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - zeitnest

  certbot:
    image: certbot/certbot
    container_name: zeitnest-certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: zeitnest-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - zeitnest

volumes:
  pgdata:
  certbot-webroot:
